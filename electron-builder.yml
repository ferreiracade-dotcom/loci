appId: org.loci.app
productName: Loci
directories:
  buildResources: build
  output: dist
files:
  - out/**
  - package.json
asarUnpack:
  - "**/*.node"
win:
  target:
    - nsis
  artifactName: ${productName}-${version}-setup.${ext}
nsis:
  oneClick: false
  perMachine: false
  allowToChangeInstallationDirectory: true
  createDesktopShortcut: true
electronDownload:
  cache: .electron-cache
